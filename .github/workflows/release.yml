name: Release

on:
  push:
    branches:
      - main
  workflow_call:
    outputs:
      changed:
        description: 버전이 변경됐는지 여부
        value: ${{ jobs.release.outputs.changed }}
      previous_version:
        description: 이전 버전
        value: ${{ jobs.release.outputs.previous_version }}
      version:
        description: 변경된 버전
        value: ${{ jobs.release.outputs.version }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      changed: ${{ steps.result.outputs.changed }}
      previous_version: ${{ steps.result.outputs.previous_version }}
      version: ${{ steps.result.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Check for releasable commits
        id: check
        run: |
          # 릴리즈 커밋 자체면 스킵
          LAST_COMMIT=$(git log -1 --pretty=%s)
          if echo "$LAST_COMMIT" | grep -qE "^chore: release"; then
            echo "releasable=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            RANGE="$LAST_TAG..HEAD"
          else
            RANGE="HEAD"
          fi
          COMMITS=$(git log --pretty=%s $RANGE)
          if echo "$COMMITS" | grep -qE "^(feat|add|fix|refactor|break)!?:"; then
            echo "releasable=true" >> $GITHUB_OUTPUT
          else
            echo "releasable=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure git
        if: steps.check.outputs.releasable == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get previous version
        id: prev
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Run standard-version
        if: steps.check.outputs.releasable == 'true'
        run: npx standard-version

      - name: Push changes and tags
        if: steps.check.outputs.releasable == 'true'
        run: git push --follow-tags

      - name: Set result outputs
        id: result
        run: |
          NEW_VERSION=$(node -p "require('./package.json').version")
          if [ "${{ steps.check.outputs.releasable }}" == "true" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "previous_version=${{ steps.prev.outputs.version }}" >> $GITHUB_OUTPUT
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "previous_version=${{ steps.prev.outputs.version }}" >> $GITHUB_OUTPUT
            echo "version=${{ steps.prev.outputs.version }}" >> $GITHUB_OUTPUT
          fi
